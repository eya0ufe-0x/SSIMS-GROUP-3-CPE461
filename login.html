<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information form</title>
     <link rel="stylesheet" href="login.css">

         <script
    defer
      src="https://kit.fontawesome.com/37eb870e00.js"
      crossorigin="anonymous"
    ></script>
</head>
<body>
    <!--  Login Section -->
        <section id="login" class="student_info">
            <div class="student_form">
                 <h2 class="student_info_h2">Student Information Form</h2>
            <p class="student_p">Please provide your name, department and preferred location to see available SIWES placements</p><br><br>
           <div class="student_form_container">
            <form action="#" id="studentForms">
           
            <div class="input-box">
            <i class="fa-solid fa-user lock"></i>
            <input type="text" id="name" name="name" required placeholder="First Name" class="name">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-user lock"></i>
            <input type="text" id="name" name="name" required placeholder="Last Name" class="name">
            </div>

            <div class="input-box">
            <i class="fa-solid fa-graduation-cap lock"></i>
            <input type="text" id="course of study" name="course of study" required placeholder="Course of Study" class="name">
            </div>

            <div class="input-box">
            <i class="fa-solid fa-location-pin lock"></i>
            <input type="text" id="location" name="location" required placeholder="Preferred Location" class="name">
            </div>

            <div class="input-box">
                <select class="location">
                    <option>Select a location</option>
                    <option>Lagos</option>
                    <option>Abuja</option>
                    <option>Port Harcourt</option>
                </select>
                <div class="arrow"></div>
            </div>

            <div class="input-box">
            <label for="submit"></label>
            <input type="submit" id="submit" name="submit" class="submit">
            </div>
            
            </form>
            </div>
            </div>
        </section>
</body>
</html>
